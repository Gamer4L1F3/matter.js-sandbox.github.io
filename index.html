<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Sandbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Space Grotesk', sans-serif; overflow: hidden; }
        canvas { display: block; }
        .tool-btn {
            transition: all 0.15s ease;
            position: relative;
            overflow: hidden;
        }
        .tool-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(245,158,11,0.08), transparent 70%);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .tool-btn:hover::before { opacity: 1; }
        .tool-btn:hover { background: rgba(245,158,11,0.08); }
        .tool-btn.active {
            background: rgba(245,158,11,0.15);
            border-color: rgba(245,158,11,0.5) !important;
            color: #f59e0b;
            box-shadow: 0 0 12px rgba(245,158,11,0.1), inset 0 0 12px rgba(245,158,11,0.05);
        }
        .tool-btn.active::before { opacity: 1; }
        .mode-btn {
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            position: relative;
            letter-spacing: 0.05em;
        }
        .mode-btn.play {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            font-weight: 600;
            box-shadow: 0 0 20px rgba(16,185,129,0.2);
        }
        .mode-btn.build {
            background: rgba(245,158,11,0.08);
            color: #f59e0b;
            border: 1px solid rgba(245,158,11,0.25);
        }
        .step-btn {
            transition: all 0.2s ease;
            background: rgba(139,92,246,0.08);
            color: #a78bfa;
            border: 1px solid rgba(139,92,246,0.2);
        }
        .step-btn:hover:not(:disabled) {
            background: rgba(139,92,246,0.15);
            border-color: rgba(139,92,246,0.35);
            box-shadow: 0 0 12px rgba(139,92,246,0.1);
        }
        .step-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(55,65,81,0.8), transparent);
        }
        .counter { font-family: 'JetBrains Mono', monospace; }
        .clear-btn {
            transition: all 0.2s ease;
            color: #f87171;
            border: 1px solid rgba(239,68,68,0.15);
            background: rgba(239,68,68,0.05);
        }
        .clear-btn:hover {
            background: rgba(239,68,68,0.15);
            border-color: rgba(239,68,68,0.3);
            box-shadow: 0 0 12px rgba(239,68,68,0.08);
        }
        #modeIndicator {
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            backdrop-filter: blur(8px);
        }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(245,158,11,0.3); }
            70% { box-shadow: 0 0 0 6px rgba(245,158,11,0); }
            100% { box-shadow: 0 0 0 0 rgba(245,158,11,0); }
        }
        .tool-btn.active { animation: pulse-ring 2s ease-out infinite; }
    </style>
</head>
<body class="bg-gray-950">
    <div class="flex h-screen w-screen">
        <!-- Sidebar -->
        <aside class="w-56 bg-gray-900 border-r border-gray-700 flex flex-col shrink-0 select-none">
            <div class="p-4 flex flex-col gap-2">
                <button id="modeToggle" class="mode-btn build w-full py-2.5 px-4 rounded-lg text-sm cursor-pointer">BUILD MODE</button>
                <button id="stepBtn" class="step-btn w-full py-2 px-4 rounded-lg text-sm cursor-pointer">STEP</button>
            </div>
            <div class="divider mx-4"></div>
            <div class="px-4 py-3 flex items-center justify-between">
                <span class="text-gray-500 text-[11px] uppercase tracking-widest font-medium">Objects</span>
                <span id="objectCount" class="counter text-amber-400 text-lg font-semibold tabular-nums">0</span>
            </div>
            <div class="divider mx-4"></div>

            <div class="px-3 py-3 flex-1 overflow-y-auto">
                <!-- Shapes -->
                <p class="text-gray-600 text-[10px] uppercase tracking-[0.15em] font-medium px-1 mb-2">Shapes</p>
                <div class="flex flex-col gap-1 mb-3">
                    <button class="tool-btn flex items-center gap-3 px-3 py-2 rounded-lg border border-transparent text-gray-400 text-sm cursor-pointer" data-tool="circle">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="8" cy="8" r="6.5"/></svg>
                        Circle
                    </button>
                    <button class="tool-btn flex items-center gap-3 px-3 py-2 rounded-lg border border-transparent text-gray-400 text-sm cursor-pointer" data-tool="rectangle">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="1.5" y="3.5" width="13" height="9" rx="1"/></svg>
                        Rectangle
                    </button>
                    <button class="tool-btn flex items-center gap-3 px-3 py-2 rounded-lg border border-transparent text-gray-400 text-sm cursor-pointer" data-tool="triangle">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M8 2L14.5 14H1.5Z"/></svg>
                        Triangle
                    </button>
                    <button class="tool-btn flex items-center gap-3 px-3 py-2 rounded-lg border border-transparent text-gray-400 text-sm cursor-pointer" data-tool="hexagon">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M8 1L14 4.5V11.5L8 15L2 11.5V4.5Z"/></svg>
                        Hexagon
                    </button>
                </div>

                <!-- Platforms -->
                <p class="text-gray-600 text-[10px] uppercase tracking-[0.15em] font-medium px-1 mb-2">Platforms</p>
                <div class="flex flex-col gap-1 mb-3">
                    <button class="tool-btn flex items-center gap-3 px-3 py-2 rounded-lg border border-transparent text-gray-400 text-sm cursor-pointer" data-tool="platform">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="1" y="5" width="14" height="6" rx="0.5" stroke-dasharray="2 2"/><line x1="1" y1="14" x2="4" y2="11"/><line x1="15" y1="14" x2="12" y2="11"/></svg>
                        Static Platform
                    </button>
                </div>

                <!-- Constraints -->
                <p class="text-gray-600 text-[10px] uppercase tracking-[0.15em] font-medium px-1 mb-2">Constraints</p>
                <div class="flex flex-col gap-1 mb-3">
                    <button class="tool-btn flex items-center gap-3 px-3 py-2 rounded-lg border border-transparent text-gray-400 text-sm cursor-pointer" data-tool="pin">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="8" cy="5.5" r="3"/><line x1="8" y1="8.5" x2="8" y2="15"/></svg>
                        Pin
                    </button>
                    <button class="tool-btn flex items-center gap-3 px-3 py-2 rounded-lg border border-transparent text-gray-400 text-sm cursor-pointer" data-tool="link">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><line x1="2" y1="8" x2="14" y2="8"/><circle cx="2" cy="8" r="2"/><circle cx="14" cy="8" r="2"/></svg>
                        Link
                    </button>
                    <button class="tool-btn flex items-center gap-3 px-3 py-2 rounded-lg border border-transparent text-gray-400 text-sm cursor-pointer" data-tool="spring">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M1.5 8L4 4.5L6.5 11.5L9 4.5L11.5 11.5L14.5 8"/></svg>
                        Spring
                    </button>
                </div>

                <!-- Utility -->
                <p class="text-gray-600 text-[10px] uppercase tracking-[0.15em] font-medium px-1 mb-2">Utility</p>
                <div class="flex flex-col gap-1">
                    <button class="tool-btn flex items-center gap-3 px-3 py-2 rounded-lg border border-transparent text-gray-400 text-sm cursor-pointer" data-tool="select">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M3.5 1.5L3.5 12.5L7.5 8.5L11.5 8.5L3.5 1.5Z"/></svg>
                        Select
                    </button>
                    <button class="tool-btn flex items-center gap-3 px-3 py-2 rounded-lg border border-transparent text-gray-400 text-sm cursor-pointer" data-tool="eraser">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M3 13h10"/><path d="M5.5 10.5L2.5 7.5l5-5 6 6-2.5 2.5H5.5z"/><path d="M8.5 3l3 3"/></svg>
                        Eraser
                    </button>
                </div>
            </div>

            <div class="divider mx-4"></div>
            <div class="p-3">
                <button id="clearAll" class="clear-btn w-full py-2 px-3 rounded-lg text-sm cursor-pointer font-medium">Clear All</button>
            </div>
            <div class="px-4 pb-4">
                <p class="text-gray-600 text-[10px] uppercase tracking-[0.15em] font-medium mb-2">Shortcuts</p>
                <div class="flex flex-col gap-1 text-[11px] text-gray-600">
                    <div class="flex justify-between"><span>Space</span><span class="counter text-gray-500">Play/Build</span></div>
                    <div class="flex justify-between"><span>S</span><span class="counter text-gray-500">Step</span></div>
                    <div class="flex justify-between"><span>1 – 0</span><span class="counter text-gray-500">Tools</span></div>
                    <div class="flex justify-between"><span>Del</span><span class="counter text-gray-500">Delete sel.</span></div>
                    <div class="flex justify-between"><span>Esc</span><span class="counter text-gray-500">Deselect</span></div>
                    <div class="flex justify-between"><span>RClick</span><span class="counter text-gray-500">Cancel</span></div>
                </div>
            </div>
        </aside>

        <!-- Main Canvas -->
        <main id="canvasContainer" class="flex-1 relative">
            <canvas id="canvas"></canvas>
            <div id="modeIndicator" class="absolute top-4 left-4 px-3 py-1.5 rounded-md text-[11px] font-semibold tracking-widest pointer-events-none"
                 style="background:rgba(245,158,11,0.08);color:#f59e0b;border:1px solid rgba(245,158,11,0.18);">BUILD</div>
            <div id="toolHint" class="absolute bottom-5 left-1/2 -translate-x-1/2 px-4 py-2 rounded-lg text-xs text-gray-500 pointer-events-none"
                 style="background:rgba(26,26,46,0.85);border:1px solid rgba(55,65,81,0.4);backdrop-filter:blur(6px);">
                Select a tool from the sidebar to begin building
            </div>
        </main>
    </div>

    <script>
        /* ── Matter.js aliases ── */
        const { Engine, Bodies, Body, Composite, Constraint, Mouse, MouseConstraint, Query, Vector } = Matter;

        /* ── Color palette ── */
        const SHAPE_COLORS = ['#2ecc71', '#e74c3c', '#3498db', '#f1c40f', '#e67e22', '#1abc9c'];
        function randomColor() { return SHAPE_COLORS[Math.floor(Math.random() * SHAPE_COLORS.length)]; }

        /* ── Tool categories ── */
        const shapeTools = ['circle', 'rectangle', 'triangle', 'hexagon'];
        const constraintTools = ['pin', 'link', 'spring'];
        const dragTools = [...shapeTools, 'platform'];

        /* ── State ── */
        let mode = 'build';
        let currentTool = null;
        let mouseX = 0, mouseY = 0;
        let isMouseDown = false;
        let startX = 0, startY = 0;
        let ghostParams = null;
        let selectedBody = null;
        let constraintStep = 1;
        let constraintBodyA = null;
        let userBodies = [];
        let userConstraints = [];
        let hoveredBody = null;

        /* FPS tracking */
        let fpsFrames = 0;
        let fpsTime = performance.now();
        let fpsDisplay = 0;

        /* ── Canvas ── */
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvasContainer');

        /* ── Engine ── */
        const engine = Engine.create({ gravity: { x: 0, y: 1 } });
        const world = engine.world;

        /* ── MouseConstraint for Play mode ── */
        const mouse = Mouse.create(canvas);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: {
                stiffness: 0.2,
                render: { visible: false }
            }
        });

        /* ── Boundaries ── */
        let ground, leftWall, rightWall;
        const BT = 60;

        function makeBoundaries() {
            const w = canvas.width, h = canvas.height;
            ground    = Bodies.rectangle(w / 2, h + BT / 2 - 2, w + BT * 2, BT, { isStatic: true, label: 'boundary' });
            leftWall  = Bodies.rectangle(-BT / 2 + 2, h / 2, BT, h + BT * 2, { isStatic: true, label: 'boundary' });
            rightWall = Bodies.rectangle(w + BT / 2 - 2, h / 2, BT, h + BT * 2, { isStatic: true, label: 'boundary' });
            return [ground, leftWall, rightWall];
        }

        function rebuildBoundaries() {
            if (ground) { Composite.remove(world, ground); Composite.remove(world, leftWall); Composite.remove(world, rightWall); }
            Composite.add(world, makeBoundaries());
        }

        function resize() {
            const r = container.getBoundingClientRect();
            canvas.width = r.width;
            canvas.height = r.height;
            /* Update mouse element bounds so MouseConstraint tracks correctly after resize */
            mouse.element.width = r.width;
            mouse.element.height = r.height;
            rebuildBoundaries();
        }
        resize();
        window.addEventListener('resize', resize);

        /* ── Freeze all dynamic bodies (used when returning to build, and after step) ── */
        function freezeAll() {
            const all = Composite.allBodies(world);
            for (let i = 0; i < all.length; i++) {
                if (!all[i].isStatic) {
                    Body.setVelocity(all[i], { x: 0, y: 0 });
                    Body.setAngularVelocity(all[i], 0);
                }
            }
        }

        /* ── Helpers ── */
        function getMousePos(e) {
            const r = canvas.getBoundingClientRect();
            return { x: e.clientX - r.left, y: e.clientY - r.top };
        }

        function getBodyAtPoint(x, y) {
            const found = Query.point(Composite.allBodies(world), { x, y });
            return found.length > 0 && !found[0].isStatic ? found[0] : null;
        }

        function getAnyUserBody(x, y) {
            const found = Query.point(Composite.allBodies(world), { x, y });
            return found.length > 0 && found[0].label !== 'boundary' ? found[0] : null;
        }

        function removeBodyAndConstraints(body) {
            const allC = Composite.allConstraints(world);
            for (let i = allC.length - 1; i >= 0; i--) {
                if (allC[i].bodyA === body || allC[i].bodyB === body) {
                    Composite.remove(world, allC[i]);
                    const idx = userConstraints.indexOf(allC[i]);
                    if (idx > -1) userConstraints.splice(idx, 1);
                }
            }
            Composite.remove(world, body);
            const idx = userBodies.indexOf(body);
            if (idx > -1) userBodies.splice(idx, 1);
        }

        /* ══════════════════════════════
           DRAWING
           ══════════════════════════════ */

        function drawBackground() {
            const grd = ctx.createRadialGradient(
                canvas.width * 0.5, canvas.height * 0.45, 0,
                canvas.width * 0.5, canvas.height * 0.45, Math.max(canvas.width, canvas.height) * 0.65
            );
            grd.addColorStop(0, '#1f1f3a');
            grd.addColorStop(1, '#1a1a2e');
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawGrid() {
            const sp = 40;
            ctx.strokeStyle = '#252545';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            for (let x = sp; x < canvas.width; x += sp) { ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); }
            for (let y = sp; y < canvas.height; y += sp) { ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); }
            ctx.stroke();
            ctx.strokeStyle = '#2a2a50';
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            for (let x = sp * 5; x < canvas.width; x += sp * 5) { ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); }
            for (let y = sp * 5; y < canvas.height; y += sp * 5) { ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); }
            ctx.stroke();
        }

        /* Ghost preview during drag-to-size */
        function drawGhost() {
            if (!ghostParams || !isMouseDown) return;
            const { tool, sx, sy, ex, ey } = ghostParams;
            const dx = ex - sx, dy = ey - sy;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 5) return;

            ctx.save();
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = tool === 'platform' ? 'rgba(139, 92, 246, 0.5)' : 'rgba(245, 158, 11, 0.5)';
            ctx.lineWidth = 1.5;

            if (tool === 'circle') {
                ctx.beginPath();
                ctx.arc(sx, sy, dist, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.fillStyle = 'rgba(245,158,11,0.5)';
                ctx.font = '11px "JetBrains Mono", monospace';
                ctx.fillText('r=' + Math.round(dist), sx + dist + 8, sy - 4);
            } else if (tool === 'rectangle' || tool === 'platform') {
                ctx.strokeRect(sx, sy, dx, dy);
                ctx.setLineDash([]);
                ctx.fillStyle = tool === 'platform' ? 'rgba(139,92,246,0.5)' : 'rgba(245,158,11,0.5)';
                ctx.font = '11px "JetBrains Mono", monospace';
                ctx.fillText(Math.abs(Math.round(dx)) + ' x ' + Math.abs(Math.round(dy)), Math.min(sx, ex), Math.min(sy, ey) - 6);
            } else if (tool === 'triangle' || tool === 'hexagon') {
                const sides = tool === 'triangle' ? 3 : 6;
                const cx = (sx + ex) / 2, cy = (sy + ey) / 2;
                const r = dist / 2;
                ctx.beginPath();
                for (let i = 0; i < sides; i++) {
                    const angle = (i * 2 * Math.PI / sides) - (sides === 3 ? Math.PI / 2 : Math.PI / 6);
                    const px = cx + r * Math.cos(angle);
                    const py = cy + r * Math.sin(angle);
                    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.stroke();
            }
            ctx.restore();
        }

        /* Constraint preview line during two-click */
        function drawConstraintPreview() {
            if (constraintStep !== 2 || !constraintBodyA) return;
            ctx.save();
            ctx.setLineDash([6, 4]);
            ctx.strokeStyle = 'rgba(245, 158, 11, 0.35)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(constraintBodyA.position.x, constraintBodyA.position.y);
            ctx.lineTo(mouseX, mouseY);
            ctx.stroke();
            ctx.setLineDash([]);

            const v = constraintBodyA.vertices;
            ctx.beginPath();
            ctx.moveTo(v[0].x, v[0].y);
            for (let j = 1; j < v.length; j++) ctx.lineTo(v[j].x, v[j].y);
            ctx.closePath();
            ctx.strokeStyle = '#f59e0b';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.fillStyle = 'rgba(245, 158, 11, 0.7)';
            ctx.font = '11px "Space Grotesk", sans-serif';
            ctx.fillText('Click second body to connect', constraintBodyA.position.x + 14, constraintBodyA.position.y - 14);
            ctx.restore();
        }

        /* Bodies */
        function drawBodies() {
            const all = Composite.allBodies(world);
            for (let i = 0; i < all.length; i++) {
                const body = all[i];
                const verts = body.vertices;

                ctx.beginPath();
                ctx.moveTo(verts[0].x, verts[0].y);
                for (let j = 1; j < verts.length; j++) ctx.lineTo(verts[j].x, verts[j].y);
                ctx.closePath();

                if (body.label === 'boundary') {
                    ctx.strokeStyle = '#888';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                } else if (body.isStatic) {
                    const fill = body.render && body.render.fillStyle ? body.render.fillStyle : '#888';
                    ctx.globalAlpha = 0.12;
                    ctx.fillStyle = fill;
                    ctx.fill();
                    ctx.globalAlpha = 0.55;
                    ctx.strokeStyle = fill;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                } else {
                    const fill = body.render && body.render.fillStyle ? body.render.fillStyle : '#ccc';
                    ctx.globalAlpha = 0.3;
                    ctx.fillStyle = fill;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    ctx.strokeStyle = fill;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }

                if (body === hoveredBody && body.label !== 'boundary') {
                    ctx.globalAlpha = 0.15;
                    ctx.fillStyle = '#f87171';
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    ctx.strokeStyle = '#f87171';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }
            ctx.globalAlpha = 1;
        }

        /* Selected body glow */
        function drawSelectedGlow() {
            if (!selectedBody) return;
            const v = selectedBody.vertices;
            ctx.save();
            ctx.shadowColor = '#3498db';
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.moveTo(v[0].x, v[0].y);
            for (let j = 1; j < v.length; j++) ctx.lineTo(v[j].x, v[j].y);
            ctx.closePath();
            ctx.strokeStyle = '#3498db';
            ctx.lineWidth = 2.5;
            ctx.stroke();
            ctx.stroke();
            ctx.restore();
        }

        /* MouseConstraint drag line in play mode */
        function drawMouseConstraintDrag() {
            if (mode !== 'play') return;
            const mc = mouseConstraint;
            if (mc.body) {
                ctx.beginPath();
                ctx.moveTo(mc.body.position.x, mc.body.position.y);
                ctx.lineTo(mc.mouse.position.x, mc.mouse.position.y);
                ctx.strokeStyle = 'rgba(52, 152, 219, 0.35)';
                ctx.lineWidth = 1.5;
                ctx.setLineDash([4, 4]);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        /* Zigzag spring line */
        function drawSpringLine(x1, y1, x2, y2) {
            const dx = x2 - x1, dy = y2 - y1;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 2) return;

            const ux = dx / dist, uy = dy / dist;
            const px = -uy, py = ux;
            const coils = Math.max(4, Math.min(14, Math.floor(dist / 12)));
            const amplitude = Math.min(7, dist * 0.05);
            const lead = Math.min(15, dist * 0.08);

            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x1 + ux * lead, y1 + uy * lead);

            const springLen = dist - 2 * lead;
            const segs = coils * 2;
            for (let i = 0; i < segs; i++) {
                const t = lead + springLen * (i + 0.5) / segs;
                const side = (i % 2 === 0) ? 1 : -1;
                ctx.lineTo(x1 + ux * t + px * amplitude * side, y1 + uy * t + py * amplitude * side);
            }
            ctx.lineTo(x2 - ux * lead, y2 - uy * lead);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = '#e67e22';
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }

        /* All constraints — over bodies */
        function drawConstraints() {
            const all = Composite.allConstraints(world);
            for (let i = 0; i < all.length; i++) {
                const c = all[i];
                /* Skip the MouseConstraint's internal constraint */
                if (c === mouseConstraint.constraint) continue;

                let wA, wB;
                if (c.bodyA) {
                    wA = { x: c.bodyA.position.x + (c.pointA ? c.pointA.x : 0), y: c.bodyA.position.y + (c.pointA ? c.pointA.y : 0) };
                } else if (c.pointA) {
                    wA = { x: c.pointA.x, y: c.pointA.y };
                }
                if (c.bodyB) {
                    wB = { x: c.bodyB.position.x + (c.pointB ? c.pointB.x : 0), y: c.bodyB.position.y + (c.pointB ? c.pointB.y : 0) };
                } else if (c.pointB) {
                    wB = { x: c.pointB.x, y: c.pointB.y };
                }
                if (!wA || !wB) continue;

                const type = c.render && c.render.type;

                if (type === 'spring') {
                    drawSpringLine(wA.x, wA.y, wB.x, wB.y);
                } else {
                    ctx.beginPath();
                    ctx.moveTo(wA.x, wA.y);
                    ctx.lineTo(wB.x, wB.y);
                    ctx.strokeStyle = '#95a5a6';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }

                const dotColor = type === 'spring' ? '#e67e22' : type === 'pin' ? '#e67e22' : '#95a5a6';
                ctx.fillStyle = dotColor;
                ctx.beginPath(); ctx.arc(wA.x, wA.y, 3, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(wB.x, wB.y, 3, 0, Math.PI * 2); ctx.fill();

                if (type === 'pin' && !c.bodyB) {
                    ctx.beginPath();
                    ctx.arc(wB.x, wB.y, 7, 0, Math.PI * 2);
                    ctx.strokeStyle = '#e67e22';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(wB.x - 3, wB.y - 3); ctx.lineTo(wB.x + 3, wB.y + 3);
                    ctx.moveTo(wB.x + 3, wB.y - 3); ctx.lineTo(wB.x - 3, wB.y + 3);
                    ctx.strokeStyle = 'rgba(230,126,34,0.5)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
        }

        /* FPS counter */
        function drawFPS() {
            fpsFrames++;
            const now = performance.now();
            if (now - fpsTime >= 500) {
                fpsDisplay = Math.round(fpsFrames / ((now - fpsTime) / 1000));
                fpsFrames = 0;
                fpsTime = now;
            }
            ctx.save();
            ctx.font = '11px "JetBrains Mono", monospace';
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.textAlign = 'right';
            ctx.fillText(fpsDisplay + ' fps', canvas.width - 12, 20);
            ctx.restore();
        }

        /* ══════════════════════════════
           CANVAS MOUSE EVENTS
           (all gated behind mode === 'build')
           ══════════════════════════════ */

        canvas.addEventListener('mousedown', (e) => {
            e.preventDefault();
            if (mode !== 'build') return;
            const pos = getMousePos(e);
            mouseX = pos.x; mouseY = pos.y;
            isMouseDown = true;

            if (dragTools.includes(currentTool)) {
                startX = pos.x; startY = pos.y;
                ghostParams = { tool: currentTool, sx: pos.x, sy: pos.y, ex: pos.x, ey: pos.y };
                return;
            }

            if (currentTool === 'select') {
                const body = getAnyUserBody(pos.x, pos.y);
                selectedBody = body || null;
                return;
            }

            if (currentTool === 'pin') {
                const body = getAnyUserBody(pos.x, pos.y);
                if (body) {
                    const c = Constraint.create({
                        bodyA: body, pointA: { x: 0, y: 0 },
                        pointB: { x: pos.x, y: pos.y },
                        stiffness: 1, render: { type: 'pin' }
                    });
                    Composite.add(world, c);
                    userConstraints.push(c);
                }
                return;
            }

            if (currentTool === 'link' || currentTool === 'spring') {
                const body = getAnyUserBody(pos.x, pos.y);
                if (body) {
                    if (constraintStep === 1) {
                        constraintBodyA = body;
                        constraintStep = 2;
                    } else if (constraintStep === 2 && body !== constraintBodyA) {
                        const stiff = currentTool === 'spring' ? 0.05 : 1;
                        const damp = currentTool === 'spring' ? 0.01 : 0;
                        const c = Constraint.create({
                            bodyA: constraintBodyA, bodyB: body,
                            pointA: { x: 0, y: 0 }, pointB: { x: 0, y: 0 },
                            stiffness: stiff, damping: damp,
                            render: { type: currentTool }
                        });
                        Composite.add(world, c);
                        userConstraints.push(c);
                        constraintStep = 1;
                        constraintBodyA = null;
                    }
                }
                return;
            }

            if (currentTool === 'eraser') {
                const body = getAnyUserBody(pos.x, pos.y);
                if (body) {
                    removeBodyAndConstraints(body);
                    if (selectedBody === body) selectedBody = null;
                }
                return;
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const pos = getMousePos(e);
            mouseX = pos.x; mouseY = pos.y;

            if (mode !== 'build') return;

            if (isMouseDown && ghostParams) {
                ghostParams.ex = pos.x;
                ghostParams.ey = pos.y;
            }

            if (isMouseDown && currentTool === 'select' && selectedBody) {
                Body.setPosition(selectedBody, { x: pos.x, y: pos.y });
                Body.setVelocity(selectedBody, { x: 0, y: 0 });
                Body.setAngularVelocity(selectedBody, 0);
            }

            if (currentTool === 'eraser') {
                hoveredBody = getAnyUserBody(pos.x, pos.y);
                canvas.style.cursor = hoveredBody ? 'pointer' : 'crosshair';
            } else if (currentTool === 'select' || constraintTools.includes(currentTool)) {
                canvas.style.cursor = 'pointer';
                hoveredBody = null;
            } else if (currentTool) {
                canvas.style.cursor = 'crosshair';
                hoveredBody = null;
            } else {
                canvas.style.cursor = 'default';
                hoveredBody = null;
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            if (mode !== 'build') { isMouseDown = false; return; }
            if (ghostParams) finalizeBody();
            isMouseDown = false;
        });

        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            if (constraintStep === 2) { constraintStep = 1; constraintBodyA = null; }
            if (ghostParams) { ghostParams = null; isMouseDown = false; }
        });

        /* Prevent text selection when dragging on canvas */
        canvas.addEventListener('selectstart', (e) => e.preventDefault());

        /* ══════════════════════════════
           FINALIZE DRAG-TO-SIZE BODY
           ══════════════════════════════ */

        function finalizeBody() {
            if (!ghostParams) return;
            const { tool, sx, sy, ex, ey } = ghostParams;
            const dx = ex - sx, dy = ey - sy;
            const dist = Math.sqrt(dx * dx + dy * dy);
            ghostParams = null;
            if (dist < 10) return;

            const color = randomColor();
            const isStatic = (tool === 'platform');
            let body = null;

            if (tool === 'circle') {
                body = Bodies.circle(sx, sy, Math.min(dist, 400), {
                    restitution: 0.4, friction: 0.15, density: 0.001,
                    isStatic, render: { fillStyle: color }
                });
            } else if (tool === 'rectangle' || tool === 'platform') {
                body = Bodies.rectangle(sx + dx / 2, sy + dy / 2, Math.max(10, Math.abs(dx)), Math.max(10, Math.abs(dy)), {
                    restitution: 0.25, friction: 0.2, density: 0.001,
                    isStatic, render: { fillStyle: color }
                });
            } else if (tool === 'triangle') {
                body = Bodies.polygon((sx + ex) / 2, (sy + ey) / 2, 3, Math.max(10, Math.min(dist / 2, 300)), {
                    restitution: 0.3, friction: 0.15, density: 0.001,
                    isStatic, render: { fillStyle: color }
                });
            } else if (tool === 'hexagon') {
                body = Bodies.polygon((sx + ex) / 2, (sy + ey) / 2, 6, Math.max(10, Math.min(dist / 2, 300)), {
                    restitution: 0.3, friction: 0.15, density: 0.001,
                    isStatic, render: { fillStyle: color }
                });
            }

            if (body) {
                Body.setVelocity(body, { x: 0, y: 0 });
                Body.setAngularVelocity(body, 0);
                Composite.add(world, body);
                userBodies.push(body);
            }
        }

        /* ══════════════════════════════
           UI CONTROLS
           ══════════════════════════════ */

        const modeToggle = document.getElementById('modeToggle');
        const modeIndicator = document.getElementById('modeIndicator');
        const stepBtn = document.getElementById('stepBtn');

        function setMode(newMode) {
            mode = newMode;
            selectedBody = null;
            constraintStep = 1;
            constraintBodyA = null;
            ghostParams = null;
            isMouseDown = false;
            hoveredBody = null;

            if (mode === 'play') {
                /* Add MouseConstraint so user can drag/throw bodies */
                Composite.add(world, mouseConstraint);
                canvas.style.cursor = 'grab';

                modeToggle.className = 'mode-btn play w-full py-2.5 px-4 rounded-lg text-sm cursor-pointer';
                modeToggle.textContent = 'PLAY MODE';
                modeIndicator.textContent = 'PLAY';
                modeIndicator.style.background = 'rgba(16,185,129,0.08)';
                modeIndicator.style.color = '#10b981';
                modeIndicator.style.borderColor = 'rgba(16,185,129,0.18)';
                stepBtn.disabled = true;
            } else {
                /* Remove MouseConstraint, freeze everything in place */
                Composite.remove(world, mouseConstraint);
                freezeAll();
                canvas.style.cursor = 'default';

                modeToggle.className = 'mode-btn build w-full py-2.5 px-4 rounded-lg text-sm cursor-pointer';
                modeToggle.textContent = 'BUILD MODE';
                modeIndicator.textContent = 'BUILD';
                modeIndicator.style.background = 'rgba(245,158,11,0.08)';
                modeIndicator.style.color = '#f59e0b';
                modeIndicator.style.borderColor = 'rgba(245,158,11,0.18)';
                stepBtn.disabled = false;
            }
        }

        modeToggle.addEventListener('click', () => setMode(mode === 'build' ? 'play' : 'build'));

        /* Step button: run exactly one physics tick, then freeze */
        stepBtn.addEventListener('click', () => {
            if (mode !== 'build') return;
            Engine.update(engine, 1000 / 60);
            freezeAll();
        });

        /* Tool selection */
        const toolButtons = document.querySelectorAll('.tool-btn');
        const toolHint = document.getElementById('toolHint');
        const hintMap = {
            circle:    'Click and drag to set center and radius',
            rectangle: 'Click and drag to define opposite corners',
            triangle:  'Click and drag to set center and size',
            hexagon:   'Click and drag to set center and size',
            platform:  'Click and drag to draw a static platform',
            pin:       'Click on a body to pin it to the background',
            link:      'Click two bodies to create a rigid link',
            spring:    'Click two bodies to create a bouncy spring',
            select:    'Click a body to select, drag to reposition',
            eraser:    'Click on any object to remove it'
        };

        function selectTool(tool) {
            currentTool = tool;
            selectedBody = null;
            constraintStep = 1;
            constraintBodyA = null;
            ghostParams = null;
            hoveredBody = null;
            updateToolUI();
        }

        function updateToolUI() {
            toolButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.tool === currentTool));
            toolHint.textContent = currentTool && hintMap[currentTool] ? hintMap[currentTool] : 'Select a tool from the sidebar to begin building';
        }

        toolButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const t = btn.dataset.tool;
                selectTool(currentTool === t ? null : t);
            });
        });

        /* Clear All */
        document.getElementById('clearAll').addEventListener('click', () => {
            /* Remove MouseConstraint if somehow present */
            if (mode === 'play') Composite.remove(world, mouseConstraint);
            Composite.clear(world, false);
            userBodies = [];
            userConstraints = [];
            selectedBody = null;
            constraintStep = 1;
            constraintBodyA = null;
            ghostParams = null;
            isMouseDown = false;
            hoveredBody = null;
            rebuildBoundaries();
            if (mode === 'play') Composite.add(world, mouseConstraint);
        });

        /* Counter */
        const objectCountEl = document.getElementById('objectCount');
        function updateCounter() { objectCountEl.textContent = userBodies.length; }

        /* Keyboard shortcuts */
        const toolKeyOrder = ['circle', 'rectangle', 'triangle', 'hexagon', 'platform', 'pin', 'link', 'spring', 'select', 'eraser'];
        document.addEventListener('keydown', (e) => {
            if (e.target.closest('input,textarea')) return;

            if (e.code === 'Space') { e.preventDefault(); setMode(mode === 'build' ? 'play' : 'build'); return; }
            if (e.code === 'KeyS' && mode === 'build') { e.preventDefault(); stepBtn.click(); return; }
            if (e.code === 'Escape') { selectTool(null); return; }

            if (e.code === 'Delete' || e.code === 'Backspace') {
                if (selectedBody && mode === 'build') {
                    removeBodyAndConstraints(selectedBody);
                    selectedBody = null;
                }
                return;
            }

            const numKeys = ['Digit1','Digit2','Digit3','Digit4','Digit5','Digit6','Digit7','Digit8','Digit9','Digit0'];
            const idx = numKeys.indexOf(e.code);
            if (idx > -1 && idx < toolKeyOrder.length) selectTool(toolKeyOrder[idx]);
        });

        /* ══════════════════════════════
           MAIN LOOP
           ══════════════════════════════ */

        function draw() {
            drawBackground();
            drawGrid();
            drawGhost();
            drawConstraintPreview();
            drawBodies();
            drawSelectedGlow();
            drawMouseConstraintDrag();
            drawConstraints();
            drawFPS();

            if (mode === 'play') {
                Engine.update(engine, 1000 / 60);
            }

            updateCounter();
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
